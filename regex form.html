<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Form Validation</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 40px; }
    .form-box { background: #fff; padding: 30px; border-radius: 8px; width: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 20px; font-size: 20px; color: #333; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 14px; margin-bottom: 5px; color: #555; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
    input.valid   { border-color: #4caf50; }
    input.invalid { border-color: #f44336; }
    .msg { font-size: 12px; margin-top: 4px; }
    .msg.ok  { color: #4caf50; }
    .msg.err { color: #f44336; }
    button { width: 100%; padding: 10px; background: #4f46e5; color: #fff; border: none; border-radius: 5px; font-size: 15px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #4338ca; }
    .success { color: green; font-size: 14px; text-align: center; margin-top: 12px; display: none; }
  </style>
</head>
<body>
<div class="form-box">
  <h2>Register</h2>
  <form id="myForm" novalidate>

    <div class="field">
      <label>Name</label>
      <input type="text" id="name" placeholder="Deepa"/>
      <div class="msg" id="msg-name"></div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="text" id="email" placeholder="deepa@example.com"/>
      <div class="msg" id="msg-email"></div>
    </div>

    <div class="field">
      <label>Phone</label>
      <input type="text" id="phone" placeholder="1234567890"/>
      <div class="msg" id="msg-phone"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 8 chars"/>
      <div class="msg" id="msg-password"></div>
    </div>

    <button type="submit">Submit</button>
    <div class="success" id="success"> Form submitted successfully!</div>
  </form>
</div>

<script>
  const rules = {
    name:     { regex: /^[A-Za-z ]{3,}$/,                      err: 'Only letters, min 3 chars' },
    email:    { regex: /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/,        err: 'Enter a valid email' },
    phone:    { regex: /^[6-9]\d{9}$/,                         err: '10-digit Indian mobile number' },
    password: { regex: /^(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/,err: 'Min 8 chars, 1 uppercase, 1 number, 1 special' }
  };

  function check(id) {
    const input = document.getElementById(id);
    const msg   = document.getElementById('msg-' + id);
    const val   = input.value.trim();
    const ok    = rules[id].regex.test(val);
    if (!val) { input.className = ''; msg.textContent = ''; return false; }
    input.className = ok ? 'valid' : 'invalid';
    msg.className   = 'msg ' + (ok ? 'ok' : 'err');
    msg.textContent = ok ? '✓ Looks good' : '✗ ' + rules[id].err;
    return ok;
  }

  Object.keys(rules).forEach(id => {
    document.getElementById(id).addEventListener('input', () => check(id));
  });

  document.getElementById('myForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const allOk = Object.keys(rules).every(id => check(id));
    document.getElementById('success').style.display = allOk ? 'block' : 'none';
  });
</script>
</body>
</html>
